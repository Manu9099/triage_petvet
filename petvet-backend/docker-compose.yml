version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: petvet_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petvetdb
    ports:
      - "5432:5432"
    volumes:
      - petvet_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petvet -d petvetdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: petvet_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  petvet_data:
